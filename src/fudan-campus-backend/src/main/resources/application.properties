spring.application.name=fudan-campus-backend

# 忙聲掳忙聧庐氓潞聯茅聟聧莽陆庐
spring.datasource.url=jdbc:mysql://localhost:3306/fudan_campus_info?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 茅聟聧莽陆庐
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 忙聴楼氓驴聴茅聟聧莽陆庐
logging.level.com.fudan.campusinfo=DEBUG

# 忙聳聡盲禄露盲赂聤盲录聽茅聟聧莽陆庐
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

